<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!-- CDE CJK font fallback configuration -->
<!-- Maps CDE's XLFD-based CJK font patterns to modern CJK fonts -->
<fontconfig>
  <!-- Japanese: -dt-interface system/user with jisx0208 encoding -->
  <alias>
    <family>-dt-interface system-medium-r-normal--*-*-*-*-m-*-jisx0208.1983-0</family>
    <prefer>
      <family>Noto Sans CJK JP</family>
      <family>IPAexGothic</family>
    </prefer>
  </alias>
  <alias>
    <family>-dt-interface user-medium-r-normal--*-*-*-*-m-*-jisx0208.1983-0</family>
    <prefer>
      <family>Noto Sans CJK JP</family>
      <family>IPAexGothic</family>
    </prefer>
  </alias>

  <!-- Korean: -dt-interface system/user with ksc5601 encoding -->
  <alias>
    <family>-dt-interface system-medium-r-normal--*-*-*-*-m-*-ksc5601.1987-0</family>
    <prefer>
      <family>Noto Sans CJK KR</family>
      <family>UnBatang</family>
    </prefer>
  </alias>
  <alias>
    <family>-dt-interface user-medium-r-normal--*-*-*-*-m-*-ksc5601.1987-0</family>
    <prefer>
      <family>Noto Sans CJK KR</family>
      <family>UnBatang</family>
    </prefer>
  </alias>

  <!-- Simplified Chinese: -dt-interface system/user with gb2312 encoding -->
  <alias>
    <family>-dt-interface system-medium-r-normal--*-*-*-*-m-*-gb2312.1980-0</family>
    <prefer>
      <family>Noto Sans CJK SC</family>
      <family>WenQuanYi Micro Hei</family>
    </prefer>
  </alias>
  <alias>
    <family>-dt-interface user-medium-r-normal--*-*-*-*-m-*-gb2312.1980-0</family>
    <prefer>
      <family>Noto Sans CJK SC</family>
      <family>WenQuanYi Micro Hei</family>
    </prefer>
  </alias>

  <!-- Traditional Chinese: -dt-interface system/user with big5 encoding -->
  <alias>
    <family>-dt-interface system-medium-r-normal--*-*-*-*-m-*-big5-1</family>
    <prefer>
      <family>Noto Sans CJK TC</family>
      <family>AR PL Mingti2L Big5</family>
    </prefer>
  </alias>
  <alias>
    <family>-dt-interface user-medium-r-normal--*-*-*-*-m-*-big5-1</family>
    <prefer>
      <family>Noto Sans CJK TC</family>
      <family>AR PL Mingti2L Big5</family>
    </prefer>
  </alias>

  <!-- General CJK fallback for -dt-application CJK fonts -->
  <alias>
    <family>-dt-application-medium-r-normal--*-*-*-*-p-*-jisx0208.1983-0</family>
    <prefer>
      <family>Noto Sans CJK JP</family>
      <family>IPAexGothic</family>
    </prefer>
  </alias>
  <alias>
    <family>-dt-application-medium-r-normal--*-*-*-*-p-*-ksc5601.1987-0</family>
    <prefer>
      <family>Noto Sans CJK KR</family>
      <family>UnBatang</family>
    </prefer>
  </alias>
  <alias>
    <family>-dt-application-medium-r-normal--*-*-*-*-p-*-gb2312.1980-0</family>
    <prefer>
      <family>Noto Sans CJK SC</family>
      <family>WenQuanYi Micro Hei</family>
    </prefer>
  </alias>
  <alias>
    <family>-dt-application-medium-r-normal--*-*-*-*-p-*-big5-1</family>
    <prefer>
      <family>Noto Sans CJK TC</family>
      <family>AR PL Mingti2L Big5</family>
    </prefer>
  </alias>
</fontconfig>