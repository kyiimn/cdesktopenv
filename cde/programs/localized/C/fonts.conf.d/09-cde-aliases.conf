<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!-- CDE font aliases for Xft rendering -->
<!-- Maps CDE's XLFD font patterns and family names to fontconfig generics -->
<fontconfig>
  <!-- CDE system font → monospace -->
  <!-- These patterns match the -dt-interface system XLFD names used in
       sys.font and various app-defaults files.  When Xft is enabled,
       _DtFontCreateXmFontList() will resolve these via fontconfig,
       which maps them to the monospace generic family. -->
  <alias>
    <family>-dt-interface system-medium-r-normal-s*-*-*-*-*-*-*-*-*</family>
    <accept><family>monospace</family></accept>
  </alias>
  <alias>
    <family>-dt-interface system-medium-r-normal-m*-*-*-*-*-*-*-*-*</family>
    <accept><family>monospace</family></accept>
  </alias>
  <alias>
    <family>-dt-interface system-medium-r-normal-xs*-*-*-*-*-*-*-*-*</family>
    <accept><family>monospace</family></accept>
  </alias>
  <alias>
    <family>-dt-interface system-medium-r-normal-l*-*-*-*-*-*-*-*-*</family>
    <accept><family>monospace</family></accept>
  </alias>
  <alias>
    <family>-dt-interface system-medium-r-normal-xl*-*-*-*-*-*-*-*-*</family>
    <accept><family>monospace</family></accept>
  </alias>
  <alias>
    <family>-dt-interface system-medium-r-normal-xxl*-*-*-*-*-*-*-*-*</family>
    <accept><family>monospace</family></accept>
  </alias>

  <!-- CDE user font → sans-serif -->
  <alias>
    <family>-dt-interface user-medium-r-normal-s*-*-*-*-*-*-*-*-*</family>
    <accept><family>sans-serif</family></accept>
  </alias>
  <alias>
    <family>-dt-interface user-medium-r-normal-m*-*-*-*-*-*-*-*-*</family>
    <accept><family>sans-serif</family></accept>
  </alias>
  <alias>
    <family>-dt-interface user-medium-r-normal-xs*-*-*-*-*-*-*-*-*</family>
    <accept><family>sans-serif</family></accept>
  </alias>
  <alias>
    <family>-dt-interface user-medium-r-normal-l*-*-*-*-*-*-*-*-*</family>
    <accept><family>sans-serif</family></accept>
  </alias>
  <alias>
    <family>-dt-interface user-medium-r-normal-xl*-*-*-*-*-*-*-*-*</family>
    <accept><family>sans-serif</family></accept>
  </alias>
  <alias>
    <family>-dt-interface user-medium-r-normal-xxl*-*-*-*-*-*-*-*-*</family>
    <accept><family>sans-serif</family></accept>
  </alias>

  <!-- CDE short family name aliases -->
  <alias>
    <family>DtinterfaceSystem</family>
    <accept><family>monospace</family></accept>
  </alias>
  <alias>
    <family>DtinterfaceUser</family>
    <accept><family>sans-serif</family></accept>
  </alias>

  <!-- CDE application font → sans-serif (used by dtinfo, dtbuilder, etc.) -->
  <alias>
    <family>-dt-application-bold-r-normal-sans-*-140-*-*-p-*-iso8859-1</family>
    <accept><family>sans-serif</family></accept>
  </alias>
  <alias>
    <family>-dt-application-bold-r-normal-serif-12-*-iso8859-1</family>
    <accept><family>serif</family></accept>
  </alias>
</fontconfig>